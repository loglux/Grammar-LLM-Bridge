upstream grammar_backend {
    server 172.25.0.11:8000 max_fails=3 fail_timeout=10s;
    server 172.25.0.12:8000 max_fails=3 fail_timeout=10s;
}

server {
    listen       80;
    server_name  _;

    location /health {
        return 200 'ok\n';
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass http://grammar_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 130s;    # >= LLM_TIMEOUT + margin
        proxy_connect_timeout 5s;
    }
}
